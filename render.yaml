services:
  # Backend API service
  - type: web
    name: todo-api
    runtime: docker
    plan: free # Change if using a paid plan
    region: ohio # Choose closest region
    buildCommand: null # Not needed for Docker
    startCommand: null # Defined in Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30

  # PostgreSQL Database
  - type: db
    name: todo-db
    engine: postgres
    plan: free
    region: ohio
